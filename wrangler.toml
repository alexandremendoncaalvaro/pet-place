#:schema node_modules/wrangler/config-schema.json
name = "pet-place"
main = "worker/index.ts"
compatibility_date = "2026-05-02"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "caixinha_pet_place"
database_id = "7ce089cf-92b6-4822-ac50-5cdbaf3cf3f8"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "caixinha-pet-media"

[[durable_objects.bindings]]
name = "REALTIME"
class_name = "RealtimeHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RealtimeHub"]

[vars]
APP_URL = "https://pet-place.pages.dev"
VAPID_SUBJECT = "https://pet-place.pages.dev"

# Configure secrets with Wrangler:
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - SESSION_SECRET
# - VAPID_PUBLIC_KEY
# - VAPID_PRIVATE_KEY

[env.production]
